######################################################################
# Version
#
# version specifies the version of this configuration file schema, not
# the fasten binary. There is only 1 version available at the moment
version: 1

web:
  listen:
    port: 8080
    host: 0.0.0.0
    # if you're using a reverse proxy like apache/nginx, you can override this value to serve fasten on a subpath.
    # eg. http://example.com/fasten/* vs http://example.com:8080
    # basepath: `/fasten`
    # leave empty unless behind a path prefixed proxy
    basepath: ''
    
    https:
      enabled: true
      certDir: "certs"
      sharedDir: "certs/shared"
  src:
    # the location on the filesystem where webapp javascript + css is located
    frontend:
      path: /opt/fasten/web
database:
  encryption:
    enabled: true
  #    key: ''
  type: 'sqlite' # postgres will be supported in the future, but is completely **BROKEN** at the moment.
  location: '/opt/fasten/db/fasten.db' # if postgres (**BROKEN**) use a DSN, eg. `host=localhost user=gorm password=gorm dbname=gorm port=9920 sslmode=required TimeZone=Asia/Shanghai`
log:
  # Logs always go to STDOUT/STDERR; when this is set they are ALSO tee'd to this file so the
  # Admin Dashboard "Server Logs" card can read them back. Defaults to the persistent DB volume
  # so it survives restarts (`kubectl logs`/`docker logs` keep working regardless). Set to '' to
  # disable file logging (STDOUT only). For local dev, override this in config.dev.yaml.
  file: '/opt/fasten/db/fasten.log' # absolute or relative paths allowed, eg. web.log
  level: INFO
# C-CDA / CCD document import (#254). Opt-in: requires the external fhir-converter
# sidecar (Metriport). Leave disabled for a stock install — FHIR/NDJSON upload is
# unaffected. When enabled, raw .xml/.ccd uploads are converted to FHIR R4 before import.
cda_converter:
  enabled: false
  url: '' # e.g. http://localhost:8777 (dev) or http://yourphr-cda-converter:8777 (k8s). Internal-only — raw CCD is PHI.
  timeout_seconds: 60
jwt:
  issuer:
    # This is a KNOWN PUBLIC default and is treated as "unset" (see #102): the
    # server never signs with it. On first run it auto-generates a strong random
    # key and persists it 0600 at <db-dir>/.jwt_issuer_key (secure-by-default,
    # zero-config). To pin your own instead, set a non-default value here or via
    # the YOURPHR_JWT_ISSUER_KEY env var (generate one with: openssl rand -hex 32).
    key: "thisismysupersecuressessionsecretlength"
