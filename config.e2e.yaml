# Committed E2E test config (no secrets — uses the public default jwt.issuer.key).
# Used by `make test-e2e` / Playwright's webServer. Port 9191 so it never collides
# with the dev backend on 9090. Fresh ./db/fasten-e2e.db each run (webServer resets it).
# HTTPS off so the session cookie is sent over http://localhost.
version: 1
web:
  listen:
    port: 9191
    host: 0.0.0.0
    https:
      enabled: false
  src:
    frontend:
      # repo-root ./dist = the Angular build output. `yarn run build` (and the Dockerfile/CI) all
      # emit here via `--output-path=../dist`; angular.json's default outputPath matches (../dist).
      path: ./dist
database:
  type: sqlite
  location: ./db/fasten-e2e.db
  encryption:
    enabled: false
log:
  # INFO (not WARN) so the per-resource import store logs ("insert/update FHIRResource
  # (Patient) <id>") are visible in the CI E2E log — to diagnose #148 (whether the seeded
  # Patient is actually stored in CI). Dial back to WARN once #148 is understood.
  level: INFO
