# Dependabot version updates for YourPHR.
# Security updates (Dependabot alerts) are enabled separately in repo settings.
# Three ecosystems: the Go backend module (root), the Angular frontend (yarn),
# and the GitHub Actions workflows.
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(deps)"
    # The local `replace github.com/fastenhealth/fasten-sources => ./fasten-sources-stub`
    # is a path replace; Dependabot ignores it (nothing to update).

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Angular 14 is pinned; major-version bumps of the framework are breaking
      # and are done as deliberate upgrades, not automated PRs.
      - dependency-name: "@angular/*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(ci)"
