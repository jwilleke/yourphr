name: Docker (YourPHR)
# Replaces upstream docker.yaml which depends on depot.dev (paid service).
# Builds linux/amd64 only — sufficient for deby (x86_64 k3s node).
# Pushes to ghcr.io/<owner>/<repo>:main on every push to main. The image name
# follows ${{ github.repository }}, so it becomes ghcr.io/jwilleke/yourphr once
# the repo is renamed (see issue #3). Update the Flux ImageRepository to match.

on:
  push:
    branches: [main]
    # Docs-only pushes don't change the image — skip the build/push (and the Flux redeploy).
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  # Manual "full loop": Actions tab -> this workflow -> Run workflow, tick no_cache for a
  # from-scratch build that ignores the layer cache (use when you suspect stale cache).
  workflow_dispatch:
    inputs:
      no_cache:
        description: "Full clean build (ignore the layer cache)"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: docker-jwilleke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history + tags so `git describe --tags` yields a semver version (#166)

      - name: Populate frontend version information
        run: cd frontend && ./git.version.sh

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=raw,value=main,enable=${{ github.ref_name == 'main' }}
            type=raw,value=main-${{ github.run_number }},enable=${{ github.ref_name == 'main' }}
          labels: |
            org.opencontainers.image.title=YourPHR
            org.opencontainers.image.description=YourPHR — your medical records, immediately and in your hands, for free. A self-hosted Personal Health Record (community continuation of Fasten OnPrem).
            org.opencontainers.image.source=https://github.com/jwilleke/yourphr
            org.opencontainers.image.revision=${{ github.sha }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ inputs.no_cache || false }}
          build-args: |
            FASTEN_ENV=prod
