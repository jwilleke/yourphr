name: Docker (jwilleke fork)
# Replaces upstream docker.yaml which depends on depot.dev (paid service).
# Builds linux/amd64 only — sufficient for deby (x86_64 k3s node).
# Pushes to ghcr.io/jwilleke/fasten-onprem:main on every push to main.

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: docker-jwilleke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Populate frontend version information
        run: cd frontend && ./git.version.sh

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=raw,value=main,enable=${{ github.ref_name == 'main' }}
            type=raw,value=main-${{ github.run_number }},enable=${{ github.ref_name == 'main' }}
          labels: |
            org.opencontainers.image.title=Fasten Health (jwilleke fork)
            org.opencontainers.image.description=Fork of fastenhealth/fasten-onprem — non-US-Core FHIR compatibility improvements
            org.opencontainers.image.source=https://github.com/jwilleke/fasten-onprem
            org.opencontainers.image.revision=${{ github.sha }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            FASTEN_ENV=prod
