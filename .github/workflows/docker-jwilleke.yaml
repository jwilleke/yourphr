name: Docker (YourPHR)
# Replaces upstream docker.yaml which depends on depot.dev (paid service).
# Builds linux/amd64 only — sufficient for deby (x86_64 k3s node).
# Builds + publishes a DEPLOYABLE image ONLY on a release tag (vX.Y.Z) — tagged :X.Y.Z / :X.Y /
# :latest. Pushes to main are CI-tested but NOT built/published here: the live instance deploys
# strictly off semver tags (Flux ImagePolicy in jwilleke/mj-infra-flux/.../yourphr-policy.yaml).
# So shipping = cutting a release (on any minor/major or on request — see docs/releasing.md).

on:
  push:
    tags: ['v*.*.*']
  # Manual "full loop": Actions tab -> this workflow -> Run workflow, tick no_cache for a
  # from-scratch build that ignores the layer cache (use when you suspect stale cache). On a
  # branch dispatch only the :sha tag is produced (not deployable — Flux ignores non-semver).
  workflow_dispatch:
    inputs:
      no_cache:
        description: "Full clean build (ignore the layer cache)"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: docker-jwilleke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags so `git describe --tags` yields a semver version (#166)

      - name: Populate frontend version information
        run: cd frontend && ./git.version.sh

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          # The semver + :latest tags only fire on v*.*.* tag pushes (cut by release-please);
          # the two main/main-<N> tags only fire on pushes to the main branch.
          tags: |
            type=raw,value=main,enable=${{ github.ref_name == 'main' }}
            type=raw,value=main-${{ github.run_number }},enable=${{ github.ref_name == 'main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=YourPHR
            org.opencontainers.image.description=YourPHR — your medical records, immediately and in your hands, for free. A self-hosted Personal Health Record (community continuation of Fasten OnPrem).
            org.opencontainers.image.source=https://github.com/jwilleke/yourphr
            org.opencontainers.image.revision=${{ github.sha }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ inputs.no_cache || false }}
          build-args: |
            YOURPHR_ENV=prod
