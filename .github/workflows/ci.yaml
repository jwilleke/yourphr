name: CI
# This workflow is triggered on pushes
on:
  push:
    branches: [ main, beta ]
    # Publish semver tags as releases.
  release:
    types: [published]
jobs:
  test:
    uses: ./.github/workflows/development.yaml
  test-coverage:
    name: Test Coverage Upload
    needs:
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      # development.yaml uploads two artifacts: `backend-coverage` and `frontend-coverage`.
      # Download all of them; each lands under coverage-artifacts/<artifact-name>/.
      - name: Download coverage reports
        uses: actions/download-artifact@v8
        with:
          path: coverage-artifacts
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: coverage-artifacts/backend-coverage/backend-coverage.txt,coverage-artifacts/frontend-coverage/lcov.info
          flags: unittests
          # Non-blocking in jwilleke fork: CODECOV_TOKEN may be unset, and a failed upload
          # must not fail CI. Set the secret and flip this to true to enforce uploads.
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
  # storybook: disabled in jwilleke fork — requires upstream Chromatic token
