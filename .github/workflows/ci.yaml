name: CI
# This workflow is triggered on pushes
on:
  push:
    branches: [ main, beta ]
    # Docs-only pushes don't need the test suite + coverage upload (this calls development.yaml).
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
    # Publish semver tags as releases.
  release:
    types: [published]

# Least-privilege default: this workflow only tests + uploads coverage (artifact
# upload and codecov use their own tokens), so it needs no write scopes.
permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/development.yaml
  test-coverage:
    name: Test Coverage Upload
    needs:
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # development.yaml uploads two artifacts: `backend-coverage` and `frontend-coverage`.
      # Download all of them; each lands under coverage-artifacts/<artifact-name>/.
      - name: Download coverage reports
        uses: actions/download-artifact@v8
        with:
          path: coverage-artifacts
      # Upload backend + frontend coverage under separate flags so Codecov tracks each
      # component independently. fail_ci_if_error stays false: a coverage-upload hiccup
      # (or an unset CODECOV_TOKEN) must never fail CI. Coverage is informational, not a gate
      # (see codecov.yml).
      - name: Upload backend coverage
        uses: codecov/codecov-action@v7
        with:
          files: coverage-artifacts/backend-coverage/backend-coverage.txt
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Upload frontend coverage
        uses: codecov/codecov-action@v7
        with:
          files: coverage-artifacts/frontend-coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
  # storybook: disabled in jwilleke fork — requires upstream Chromatic token
