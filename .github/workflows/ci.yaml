name: CI
# This workflow is triggered on pushes
on:
  push:
    branches: [ main, beta ]
    # Publish semver tags as releases.
  release:
    types: [published]
jobs:
  test:
    uses: ./.github/workflows/development.yaml
  test-coverage:
    name: Test Coverage Upload
    needs:
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ${{ github.workspace }}/backend-coverage.txt,${{ github.workspace }}/lcov.info
          flags: unittests
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }} # required
          verbose: true
  # storybook: disabled in jwilleke fork — requires upstream Chromatic token
