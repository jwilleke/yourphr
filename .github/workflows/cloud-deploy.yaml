name: Cloud-Deploy
# NEUTRALIZED in jwilleke fork — deploys the frontend to upstream's AWS S3 bucket
# (app-sandbox.fastenhealth.com) using an upstream IAM role. The `release: published`
# auto-trigger has been removed so it no longer fires (and fails) on releases, and the
# job is gated to the upstream repository. Kept for reference.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: deploy
    if: ${{ github.repository == 'fastenhealth/fasten-onprem' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v3
        with:
          node-version: 24.x
      - uses: actions/setup-go@v6
        with:
          go-version: '1.21.1'
      - run: go version
      - run: |
          make dep-frontend
          cd frontend
          yarn run build -- --configuration cloud_sandbox --output-path=../dist

      - name: Configure AWS credentials using delegated access
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:iam::410145376638:role/fasten-sandbox-app-gh-frontend-deploy-role
          aws-region: us-east-1

      - name: Copy files to the test website with the AWS CLI
        run: |
          aws s3 sync dist s3://app-sandbox.fastenhealth.com --acl public-read

      - uses: chrnorm/deployment-action@v2
        name: Create GitHub deployment
        id: deployment
        with:
          token: '${{ github.token }}'
          environment-url: https://app-sandbox.fastenhealth.com/
          environment: sandbox
          initial-status: success

