name: Markdown Lint

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !node_modules/**
            !dist/**
            !CHANGELOG.md
