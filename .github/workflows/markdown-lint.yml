name: Markdown Lint

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Least privilege: the lint job only reads the checked-out repo.
permissions:
  contents: read

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          # Canonical exclusion set — keep identical to development.yaml's markdownlint step.
          # vendor/ + dist/ are gitignored build/vendor artifacts (absent in CI, present locally);
          # LICENSE.md is legal text and CHANGELOG.md is release-please-generated — none hand-edited.
          globs: |
            **/*.md
            !**/node_modules/**
            !vendor/**
            !**/dist/**
            !**/test-results/**
            !**/storybook-static/**
            !LICENSE.md
            !CHANGELOG.md
