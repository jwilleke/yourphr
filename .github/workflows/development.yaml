name: Development

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    # Docs-only PRs don't need the Go/Angular test suite. (A mixed code+docs PR still runs.)
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_call:

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
      - name: Test Frontend
        run: |
          make test-frontend-coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ${{ github.workspace }}/frontend/coverage/fastenhealth/lcov.info
          retention-days: 1
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    container: ghcr.io/packagrio/packagr:latest-golang
    env:
      STATIC: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      # Cache the Go module cache + build cache across runs. This also caches the Go 1.25/1.26
      # toolchain that GOTOOLCHAIN auto-downloads (it lives under the module cache), so each run
      # stops re-fetching it and recompiling deps from cold. Key invalidates on go.sum changes.
      - name: Cache Go modules + build
        uses: actions/cache@v4
        with:
          path: |
            /go/pkg/mod
            /root/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Setup
        run: |
          go install github.com/golang/mock/mockgen@v1.6.0
          go generate ./...
      - name: Test Backend
        run: |
          make test-backend-coverage
          CGO_ENABLED=0 go build -buildvcs=false ./backend/cmd/fasten/
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ${{ github.workspace }}/backend-coverage.txt
          retention-days: 1
  compile-storybook:
    name: Compile Storybook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
      - run: |
          make build-storybook

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
      - name: ng lint (angular-eslint)
        run: |
          make lint-frontend

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          # Uses .markdownlint.json at the repo root. Skip vendored/3rd-party
          # and legal text.
          globs: |
            **/*.md
            !vendor/**
            !**/node_modules/**
            !LICENSE.md
