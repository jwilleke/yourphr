name: Development

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    # Docs-only PRs don't need the Go/Angular test suite. (A mixed code+docs PR still runs.)
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_call:

# Least-privilege default for every job: checkout + test + artifact upload only
# (artifact upload uses its own token), so no write scopes are required. Also
# caps the permissions when called as a reusable workflow from ci.yaml.
permissions:
  contents: read

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
      - name: Test Frontend
        run: |
          make test-frontend-coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: ${{ github.workspace }}/frontend/coverage/fastenhealth/lcov.info
          retention-days: 1
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    container: ghcr.io/packagrio/packagr:latest-golang
    env:
      STATIC: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      # Cache the Go module cache + build cache across runs. This also caches the Go 1.25/1.26
      # toolchain that GOTOOLCHAIN auto-downloads (it lives under the module cache), so each run
      # stops re-fetching it and recompiling deps from cold. Key invalidates on go.sum changes.
      - name: Cache Go modules + build
        uses: actions/cache@v5
        with:
          path: |
            /go/pkg/mod
            /root/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Setup
        run: |
          go install github.com/golang/mock/mockgen@v1.6.0
          go generate ./...
      - name: Test Backend
        run: |
          make test-backend-coverage
          CGO_ENABLED=0 go build -buildvcs=false ./backend/cmd/fasten/
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: ${{ github.workspace }}/backend-coverage.txt
          retention-days: 1
  test-e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
      # Cache the Go module + build cache so the webServer's `go run` of the backend is fast.
      - name: Cache Go modules + build
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-e2e-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-e2e-
            ${{ runner.os }}-go-
      - name: Install frontend deps
        run: make dep-frontend
      # Browser binaries + OS libs (chromium + firefox for the multi-browser CSP matrix, #131).
      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium firefox
      # Builds the frontend, then Playwright boots the Go backend (config.e2e.yaml, fresh
      # ./db/fasten-e2e.db, :9191) serving dist under /web and runs the smoke suite.
      - name: Run E2E
        run: make test-e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  compile-storybook:
    name: Compile Storybook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
      - run: |
          make build-storybook

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
      - name: ng lint (angular-eslint)
        run: |
          make lint-frontend

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          # Canonical exclusion set — keep identical to markdown-lint.yml. Skip vendored/3rd-party
          # and gitignored build artifacts (vendor/, dist/), legal text (LICENSE.md), and the
          # machine-generated CHANGELOG (release-please regenerates it each release; its format
          # trips MD012 and we don't hand-edit it).
          globs: |
            **/*.md
            !**/node_modules/**
            !vendor/**
            !**/dist/**
            !**/test-results/**
            !**/storybook-static/**
            !LICENSE.md
            !CHANGELOG.md
