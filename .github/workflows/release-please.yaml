name: release-please

# Manually-triggered SemVer releases driven by Conventional Commits (closes #91).
#
# This does NOT run on push. A maintainer runs it on demand (Actions tab ->
# release-please -> "Run workflow"). It then opens/updates a single "release PR"
# that rolls every conventional commit since the last release into CHANGELOG.md.
# Merging that PR creates the git tag (vX.Y.Z) AND a GitHub Release. Nothing is
# released until you merge the PR, so release cadence is entirely in your hands.
#
# Bump policy: `versioning: always-bump-patch` in release-please-config.json means
# every release is a PATCH bump (e.g. 1.1.3 -> 1.1.4). Cadence is controlled by the
# manual trigger above (we don't cut a release per fix). A MINOR or MAJOR bump is
# NOT automatic under this policy — make a commit with a `Release-As: 1.2.0` (or
# `2.0.0`) footer when you intend a minor/major.
#
# NOTE (one-time repo setting): Settings -> Actions -> General -> Workflow permissions
# must have "Allow GitHub Actions to create and approve pull requests" enabled (done),
# or the release PR cannot be opened.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please writes CHANGELOG.md with '*' bullets + extra blank lines that fail our markdown
      # rulebook (MD004 wants '-', MD012). Normalize it on the release branch so the changelog lands on
      # main already markdown-lint-clean — same rulebook as every other doc, no exclusion needed.
      # Runs only when a release PR was created/updated. (Relates to #241.)
      - name: Normalize generated CHANGELOG to the markdown rulebook
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          RELEASE_BRANCH: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
        run: |
          git fetch origin "$RELEASE_BRANCH"
          git checkout "$RELEASE_BRANCH"
          npx --yes markdownlint-cli2 --fix CHANGELOG.md || true
          if ! git diff --quiet -- CHANGELOG.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "style(changelog): markdownlint --fix generated CHANGELOG"
            git push origin HEAD:"$RELEASE_BRANCH"
          fi
