name: release-please

# SemVer releases driven by Conventional Commits (closes #91; auto-cut + CI wiring #241).
#
# Runs on every push to main: release-please keeps a single "release PR" up to date, rolling every
# conventional commit since the last release into CHANGELOG.md + bumping the version. The release is
# cut when that PR is MERGED — which creates the git tag (vX.Y.Z) AND the GitHub Release. Nothing is
# released until you merge the PR. (workflow_dispatch is kept so you can also run it on demand.)
#
# Bump policy: `versioning: default` in release-please-config.json — the bump follows the
# Conventional Commit types since the last release: `feat:` -> MINOR (1.3.0 -> 1.4.0), a
# `feat!:` / `BREAKING CHANGE:` -> MAJOR (-> 2.0.0), `fix:` -> PATCH. docs/chore/etc. do not bump, so
# after a release with only docs/chore commits no release PR is opened (nothing to release).
#
# TOKEN (#241): the steps use ${{ secrets.RELEASE_PAT }} when present, else fall back to the
# default GITHUB_TOKEN. The fallback WORKS, but events it creates (the release PR, the tag/Release) do
# NOT trigger other workflows — GitHub blocks Actions-token events from starting more Actions. So with
# only GITHUB_TOKEN the release PR shows no checks and the published Release does not fire ci.yaml's
# `release: [published]`. To make PRs + tags trigger CI, create a token and add it as the
# RELEASE_PAT repo secret (one-time, maintainer-only):
#   - PAT (classic): scopes `repo` + `workflow`; or fine-grained: Contents + Pull requests = Read/write.
#   - or a GitHub App installation token. Then add it at:
#     Settings -> Secrets and variables -> Actions -> New repository secret named RELEASE_PAT.
#   No workflow change is needed afterwards — it is picked up automatically.
#
# One-time repo setting: Settings -> Actions -> General -> Workflow permissions ->
# "Allow GitHub Actions to create and approve pull requests" must be enabled (needed for the fallback).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please writes CHANGELOG.md with '*' bullets + extra blank lines that fail our markdown
      # rulebook (MD004 wants '-', MD012). Normalize it on the release branch so the changelog lands on
      # main already markdown-lint-clean — same rulebook as every other doc, no exclusion needed.
      # Runs only when a release PR was created/updated. (#241.)
      - name: Normalize generated CHANGELOG to the markdown rulebook
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          # Pass the PR JSON as a plain string and parse it in bash. Do NOT use fromJSON() here: on a
          # release-phase run (PR already merged) outputs.pr is empty and fromJSON('') fails the whole
          # job at template eval, even though `if` is false.
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          RELEASE_BRANCH="$(printf '%s' "$PR_JSON" | jq -r '.headBranchName')"
          git fetch origin "$RELEASE_BRANCH"
          git checkout "$RELEASE_BRANCH"
          npx --yes markdownlint-cli2 --fix CHANGELOG.md || true
          if ! git diff --quiet -- CHANGELOG.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "style(changelog): markdownlint --fix generated CHANGELOG"
            git push origin HEAD:"$RELEASE_BRANCH"
          fi
