name: release-please

# Automated SemVer releases driven by Conventional Commits (closes #91).
#
# On every push to main, release-please opens/updates a "release PR" that bumps the
# version and rolls all conventional commits since the last release into CHANGELOG.md.
# Merging that PR creates the git tag (vX.Y.Z) AND a GitHub Release with the notes.
#   fix:            -> patch   (1.1.3 -> 1.1.4)
#   feat:           -> minor   (1.1.3 -> 1.2.0)
#   feat!/BREAKING  -> major   (1.1.3 -> 2.0.0)
#
# NOTE (one-time repo setting): Settings -> Actions -> General -> Workflow permissions
# must have "Allow GitHub Actions to create and approve pull requests" enabled, or the
# release PR cannot be opened.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
