<ng-container [ngTemplateOutlet]="loading ? showLoading : (isEmpty ? showEmpty : showContent)"></ng-container>

<ng-template #showLoading>
  <loading-widget></loading-widget>
</ng-template>

<!-- Empty category: the no-guessing marker (#178), inside a titled card so the patient still knows
     which category was empty — not the generic "Add Source" empty-widget. -->
<ng-template #showEmpty>
  <div class="card card-table-one">
    <h6 class="card-title mg-b-0">{{ widgetConfig?.title_text }}</h6>
    <p class="az-content-text mg-b-10" *ngIf="widgetConfig?.description_text">{{ widgetConfig?.description_text }}</p>
    <app-missing-data [field]="widgetConfig?.title_text"></app-missing-data>
  </div>
</ng-template>

<ng-template #showContent>
  <div class="card card-table-one">
    <div class="d-flex justify-content-between align-items-center">
      <h6 class="card-title mg-b-0">{{ widgetConfig?.title_text }}</h6>
      <span class="tx-12 tx-gray-500">{{ totalCount }} total</span>
    </div>
    <p class="az-content-text mg-b-10" *ngIf="widgetConfig?.description_text">{{ widgetConfig?.description_text }}</p>
    <ul class="list-unstyled mg-b-0">
      <li *ngFor="let row of rows" class="d-flex justify-content-between align-items-center mg-b-5">
        <a [routerLink]="row.link" class="text-truncate mg-r-10">
          <strong>{{ row.title }}</strong>
          <span *ngIf="row.date" class="tx-gray-500 tx-12"> &middot; {{ row.date | date:'mediumDate' }}</span>
        </a>
        <span *ngIf="row.status" class="badge bg-light text-capitalize">{{ row.status }}</span>
      </li>
    </ul>
    <a *ngIf="viewAllRoute" [routerLink]="viewAllRoute" class="tx-12 d-inline-block mg-t-5">View all &rarr;</a>
  </div>
</ng-template>
