<div class="card card-fhir-resource">
  <div class="card-header" (click)="isCollapsed = ! isCollapsed">
    <div>
      <h6 class="card-title">{{displayModel?.code_text || 'Condition'}}</h6>
      <p class="card-text tx-gray-400" *ngIf="displayModel?.onset_datetime || displayModel?.date_recorded"><strong>Onset</strong> {{(displayModel?.onset_datetime || displayModel?.date_recorded) | date}}</p>
    </div>
    <fhir-ui-badge class="float-end" [status]="displayModel?.clinical_status">{{displayModel?.clinical_status}}</fhir-ui-badge>
  </div>
  <div #collapse="ngbCollapse" [(ngbCollapse)]="isCollapsed" class="card-body">
    <fhir-ui-table [displayModel]="displayModel" [tableData]="tableData"></fhir-ui-table>
  </div>
  <div *ngIf="showDetails" class="card-footer">
    <a class="float-end" [routerLink]="['/explore', displayModel?.source_id, 'resource', displayModel?.source_resource_id]">details</a>
  </div>
</div>
